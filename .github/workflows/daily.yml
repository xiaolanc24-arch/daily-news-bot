name: Daily News Bot

on:
  schedule:
    - cron: '45 12 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run news bot
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python daily_news.py
