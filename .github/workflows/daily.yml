name: Daily News Bot
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '2 1 * * *'
  workflow_dispatch:
jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python daily_news.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
